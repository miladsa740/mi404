name: Build Servers + SubConv Mihomo

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Run script (generate servers.txt)
        run: python script.py

      # =========================
      # 🔥 Download SubConv
      # =========================
      - name: Download SubConv
        run: |
          curl -L -o subconv https://github.com/SubConv/SubConv/releases/latest/download/subconv-linux-amd64
          chmod +x subconv

      # =========================
      # 🔥 Convert to Mihomo YAML
      # =========================
      - name: Generate flclashmi.yaml
        run: |
          ./subconv -g \
            -i https://raw.githubusercontent.com/miladsa740/mi404/refs/heads/main/servers.txt \
            -o flclashmi.yaml

      # =========================
      # Commit & Push
      # =========================
      - name: Commit and Push
        run: |
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"

          git add servers.txt flclashmi.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update servers + Mihomo config"
            git push origin HEAD:main
          fi
